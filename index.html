<html xmlns="http://www.w3.org/1999/xhtml">

<head>
	<meta name="viewport" content="initial-scale=1.0, user-scalable=0, width=device-width">
	<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
	<meta content="utf-8" http-equiv="encoding">
	<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.2.0/css/all.css">
	<link id='favicon' rel="icon" type="image/png" href="favicon.ico">
	<link rel="stylesheet" type="text/css" href="css/animation.css">
	<link rel="stylesheet" type="text/css" href="css/content.css">
	<link rel="stylesheet" type="text/css" href="css/media.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="js/visual.js"></script>
	<script src="js/head.js"></script>
	<script src="js/core.js"></script>
	<script src="js/base.js"></script>
	<script src="js/init.js"></script>
	<script src="js/main.js"></script>
</head>

<body>
	<div id='wrapper'>
		<div id='container'>
			<div id='guide'></div>
			<div id='toggle' class='fas fa-sun' title='Visual'></div>
			<div id='main'>
				<div id='dots'>
				  <div class="fill"></div>
				  <div class="fill"></div>
				  <div class="fill"></div>
				  <div class="fill"></div>
				  <div class="fill"></div>
			  </div>
				<div id='progressBar'>
					<div class='progress'></div>
				</div>
				<div id='notification'></div>
				<div id='top'>
					<div id='arm'>
						<form id='search' action='#'>
							<div id='home'>acktic</div>
							<div id='input'>
								<div class='icon'>
									<div class='fa fa-search'></div>
								</div>
								<input type='text' value='Search'>
							</div>
							<input type='submit'>
							<div id='match'>
								<div class='listing guide'></div>
							</div>
						</form>
						<div id='option'>
							<div class='fas fa-home' title='Home'></div>
							<div class='fas fa-terminal' title='Random in Category'></div>
							<div class='fas fa-code' title='Random'></div>
							<div class='fa fa-heart-o' title='Read Category'></div>
							<div class='fas fa-sun' title='Visual'></div>
							<div class='fas fa-map' title='Only Images'></div>
						</div>
					</div>
				</div>
				<div id='visit'>
					<div id='page'>
						<div id='handle'>
							<div id='placeholder'></div>
						</div>
						<form id='front' action='#'>
							<div class='focus'>
								<div class='icon'>
									<div class='inputIcon fa fa-search'></div>
								</div>
								<input type='text' value='Search'>
								<div class='button'>
									<div class='buttonSearch fas fa-search'></div>
								</div>
							</div>
							<div id='label'>
							  <div class='show'>Quick feeds</div>
							  <div class='link'>
									<div class='fa-angle-up'></div>
							  </div>
						  </div>
							<div class='quick invisible'>
								<div class='left fa-angle-left' style='display:none'></div>
								<div class='right fa-angle-right'></div>
								<div class='feed'></div>
							</div>
							<div id='first'>
								<div class='listing guide'></div>
							</div>
							<input type='submit'>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>

<script>
visual()
</script>

</html>
